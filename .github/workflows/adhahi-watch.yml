name: adhahi-watch

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state/
          key: adhahi-state-${{ github.run_id }}
          restore-keys: |
            adhahi-state-

      - name: Run watcher
        run: python adhahi_watch.py
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          ADHAHI_WILAYAS_URL: ${{ secrets.ADHAHI_WILAYAS_URL }}
